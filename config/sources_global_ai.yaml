category: global_ai
description: "English-language AI and tech news — mainstream media, US AI lab blogs, and AI-focused newsletters"

defaults:
  fetch_timeout_s: 15
  max_articles_per_run: 30
  relevance_threshold: 3
  rate_limit_rps: 0.5

sources:
  # ── US AI Lab Blogs ────────────────────────────────────────────────────────
  - name: "Google DeepMind Blog"
    feed_url: "https://deepmind.google/blog/rss.xml"
    home_url: "https://deepmind.google/blog/"
    tier: 1
    language: en
    enabled: true
    tags: ["US Labs"]
    relevance_threshold: 2
    notes: "Almost all posts are directly relevant"

  - name: "Anthropic News"
    feed_url: null
    home_url: "https://www.anthropic.com/news"
    tier: 1
    language: en
    enabled: true
    tags: ["US Labs"]
    relevance_threshold: 2
    scrape_config:
      link_selector: "a[href*='/news/']"
      max_links: 20
    notes: "No public RSS; scrape news index"

  - name: "OpenAI Blog"
    feed_url: "https://openai.com/news/rss.xml"
    home_url: "https://openai.com/news"
    tier: 1
    language: en
    enabled: true
    tags: ["US Labs"]
    relevance_threshold: 2
    notes: "RSS works with curl/wget UA; browser UA gets 403 on /news but RSS endpoint is open"

  - name: "Meta AI Blog"
    feed_url: null
    home_url: "https://ai.meta.com/blog/"
    tier: 1
    language: en
    enabled: true
    tags: ["US Labs"]
    relevance_threshold: 2
    scrape_config:
      link_selector: "a[href*='/blog/']"
      max_links: 20

  - name: "Hugging Face Blog"
    feed_url: "https://huggingface.co/blog/feed.xml"
    home_url: "https://huggingface.co/blog"
    tier: 2
    language: en
    enabled: true
    tags: ["AI Research", "Open Source"]
    relevance_threshold: 3

  - name: "Synced (机器之心 English)"
    feed_url: "https://syncedreview.com/feed"
    home_url: "https://syncedreview.com"
    tier: 1
    language: en
    enabled: true
    tags: ["AI Research", "China", "Industry"]
    relevance_threshold: 3
    max_articles_per_run: 10
    notes: "English edition of Jiqizhixin (机器之心); covers global AI with China perspective"

