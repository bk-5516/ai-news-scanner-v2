category: china_ai
description: "Chinese-language AI and tech news — business media, AI-focused outlets, and tech blogs"

defaults:
  fetch_timeout_s: 20
  max_articles_per_run: 25
  relevance_threshold: 5
  rate_limit_rps: 0.3

