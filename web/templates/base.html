<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}AI News Scanner{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    [x-cloak] { display: none; }
    .score-badge { font-size: 0.65rem; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

  <!-- Nav -->
  <nav class="bg-white border-b border-gray-200 sticky top-0 z-40">
    <div class="max-w-6xl mx-auto px-4 flex items-center justify-between h-12">
      <a href="/" class="font-semibold text-gray-800 text-sm tracking-wide">AI News Scanner</a>
      <div class="flex gap-4 text-sm">
        <a href="/" class="text-gray-600 hover:text-gray-900 {% if request.url.path == '/' %}font-medium text-gray-900{% endif %}">Feed</a>
        <a href="/health" class="text-gray-600 hover:text-gray-900 {% if request.url.path == '/health' %}font-medium text-gray-900{% endif %}">Sources</a>
      </div>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
