name: News Scan

on:
  schedule:
    - cron: '0 6,14,22 * * *'   # 3× daily at 06:00, 14:00, 22:00 UTC
  workflow_dispatch:              # manual "Run workflow" button in Actions tab

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'

      - name: Restore DB cache
        uses: actions/cache@v4.2.0
        with:
          path: data/news.db
          key: news-db-${{ github.run_number }}
          restore-keys: news-db-

      - name: Install dependencies
        run: |
          mkdir -p data
          pip install -e .

      - name: Run scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DB_PATH: data/news.db
        run: PYTHONPATH=. python scripts/run_scan.py

      - name: Export JSON for Pages
        env:
          DB_PATH: data/news.db
        run: PYTHONPATH=. python scripts/export_json.py

      - name: Commit dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/articles.json
          COUNT=$(python -c "import json; d=json.load(open('docs/data/articles.json')); print(len(d['articles']))")
          git diff --staged --quiet || git commit -m "scan: $(date -u +'%Y-%m-%d %H:%M') UTC — ${COUNT} articles"
          git push
